<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsere Zeit – Ein Mini-Vlog-Kalender</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5efe3;
    --warm-brown: #7a5c3a;
    --dark-brown: #3d2b1a;
    --rust: #c4703a;
    --sage: #7a9478;
    --sand: #d4b896;
    --light-sand: #ede3d3;
    --gold: #c8973a;
    --muted: #b0a090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', Georgia, serif;
    background-color: var(--cream);
    color: var(--dark-brown);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SVG Background ── */
  .bg-illustration {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* ── Page Layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  header .subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--dark-brown);
    line-height: 1.15;
  }

  header h1 em {
    color: var(--rust);
    font-style: italic;
  }

  .header-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(to right, var(--rust), var(--gold));
    margin: 18px auto 0;
    border-radius: 2px;
  }

  /* ── Month Navigation ── */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 28px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .month-nav button {
    background: none;
    border: 1.5px solid var(--sand);
    color: var(--warm-brown);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .month-nav button:hover {
    background: var(--rust);
    border-color: var(--rust);
    color: white;
    transform: scale(1.1);
  }

  .month-nav button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none;
  }

  .month-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--dark-brown);
    min-width: 200px;
    text-align: center;
  }

  /* ── Calendar Grid ── */
  .calendar-wrap {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    border: 1.5px solid rgba(212,184,150,0.4);
    padding: 28px;
    box-shadow: 0 8px 40px rgba(122,92,58,0.1);
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .weekday {
    text-align: center;
    font-family: 'Lora', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    position: relative;
    transition: all 0.2s;
  }

  .day.empty {
    background: transparent;
  }

  .day.no-video {
    color: #c8bfb4;
    background: rgba(200,191,180,0.12);
    cursor: default;
  }

  .day.has-video {
    background: linear-gradient(135deg, var(--rust) 0%, var(--gold) 100%);
    color: white;
    cursor: pointer;
    font-weight: 500;
    box-shadow: 0 3px 12px rgba(196,112,58,0.3);
  }

  .day.has-video:hover {
    transform: scale(1.12) translateY(-2px);
    box-shadow: 0 8px 20px rgba(196,112,58,0.45);
  }

  .day.has-video::after {
    content: '▶';
    position: absolute;
    bottom: 4px;
    right: 5px;
    font-size: 0.45rem;
    opacity: 0.8;
  }

  .day.today-marker {
    outline: 2px solid var(--sage);
    outline-offset: 2px;
  }

  /* ── Video Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(40,22,10,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.25s ease;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    padding: 28px;
    box-shadow: 0 24px 80px rgba(40,22,10,0.4);
    animation: scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
  }

  .modal-date {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--dark-brown);
    margin-bottom: 18px;
  }

  .video-frame {
    position: relative;
    padding-bottom: 56.25%;
    border-radius: 12px;
    overflow: hidden;
    background: #1a1a1a;
  }

  .video-frame iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--rust); }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s 0.5s ease both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
  }

  .legend-dot {
    width: 22px;
    height: 22px;
    border-radius: 7px;
  }

  .legend-dot.has { background: linear-gradient(135deg, var(--rust), var(--gold)); }
  .legend-dot.none { background: rgba(200,191,180,0.25); border: 1px solid #d8d0c8; }

  /* ── Footer ── */
  footer {
    text-align: center;
    margin-top: 52px;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--muted);
    animation: fadeUp 0.8s 0.6s ease both;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════ -->
<div class="page">

  <header>
    <p class="subtitle">Ein kleines Tagebuch für dich</p>
    <h1>Meine Monate, <em>für dich</em></h1>
    <div class="header-line"></div>
  </header>

  <div class="month-nav">
    <button id="prevBtn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button id="nextBtn" onclick="changeMonth(1)">&#8594;</button>
  </div>

  <div class="calendar-wrap">
    <div class="weekday-row">
      <div class="weekday">Mo</div>
      <div class="weekday">Di</div>
      <div class="weekday">Mi</div>
      <div class="weekday">Do</div>
      <div class="weekday">Fr</div>
      <div class="weekday">Sa</div>
      <div class="weekday">So</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot has"></div>
      <span>Video vorhanden</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot none"></div>
      <span>Kein Video</span>
    </div>
  </div>

  <footer>
    Aufgenommen zwischen August 2025 und Mai 2026 &nbsp;·&nbsp; Glaub mir, ganz egal wo ich grad bin, ich nehm dich überall mithin 🐢🦒
  </footer>
</div>

<!-- ═══════════════════════════════════════════
     VIDEO MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-title" id="modalTitle">Mini-Vlog</div>
    <div class="video-frame">
      <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  VIDEO-DATEN
//  Format: "YYYY-MM-DD": { youtubeId: "VIDEO_ID", title: "Titel" }
//  Ersetze VIDEO_ID durch die echte YouTube-Video-ID (z.B. "dQw4w9WgXcQ")
// ══════════════════════════════════════════════════════════════
const videos = {
  // ── Beispiele – bitte durch deine echten YouTube-IDs ersetzen ──
  "2025-08-15": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-08-28": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-09-10": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-09-22": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-10-05": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-10-19": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-11-03": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-11-17": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-12-01": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2025-12-20": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-01-08": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-01-25": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-02-14": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-03-07": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-03-21": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-04-10": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-05-02": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
  "2026-05-18": { youtubeId: "DEINE_VIDEO_ID", title: "🥬🫛" },
};

// ── Zeitraum-Grenzen ──
const START_MONTH = { year: 2025, month: 7 };  // August 2025 (0-indexed)
const END_MONTH   = { year: 2026, month: 4 };  // Mai 2026

const MONTH_NAMES = [
  "Januar","Februar","März","April","Mai","Juni",
  "Juli","August","September","Oktober","November","Dezember"
];

let currentYear  = START_MONTH.year;
let currentMonth = START_MONTH.month;

function pad(n){ return String(n).padStart(2,"0"); }

function renderCalendar() {
  const grid  = document.getElementById("daysGrid");
  const label = document.getElementById("monthLabel");
  label.textContent = MONTH_NAMES[currentMonth] + " " + currentYear;

  grid.innerHTML = "";

  // first weekday of month (0=Sun..6=Sat → convert to Mon-first: 0=Mon..6=Sun)
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const offset   = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  // empty cells
  for(let i = 0; i < offset; i++){
    const el = document.createElement("div");
    el.className = "day empty";
    grid.appendChild(el);
  }

  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = `${currentYear}-${pad(currentMonth+1)}-${pad(d)}`;
    const el = document.createElement("div");
    el.className = "day";

    if(videos[dateStr]){
      el.classList.add("has-video");
      el.title = videos[dateStr].title;
      el.onclick = () => openModal(dateStr);
    } else {
      el.classList.add("no-video");
    }

    el.textContent = d;
    grid.appendChild(el);
  }

  // nav buttons
  const atStart = currentYear === START_MONTH.year && currentMonth === START_MONTH.month;
  const atEnd   = currentYear === END_MONTH.year   && currentMonth === END_MONTH.month;
  document.getElementById("prevBtn").disabled = atStart;
  document.getElementById("nextBtn").disabled = atEnd;
}

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth > 11){ currentMonth = 0; currentYear++; }
  if(currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function openModal(dateStr){
  const v = videos[dateStr];
  if(!v) return;

  const [y,m,d] = dateStr.split("-");
  document.getElementById("modalDate").textContent =
    `${parseInt(d)}. ${MONTH_NAMES[parseInt(m)-1]} ${y}`;
  document.getElementById("modalTitle").textContent = v.title;
  document.getElementById("videoFrame").src =
    `https://www.youtube.com/embed/${v.youtubeId}?autoplay=1&rel=0`;

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.getElementById("videoFrame").src = "";
  document.body.style.overflow = "";
}

// close on overlay click
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});

// close on Escape
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeModal();
});

renderCalendar();
</script>
</body>
</html>
